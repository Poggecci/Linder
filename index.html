<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Linder/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0b0b16" />
    <link rel="manifest" href="/Linder/manifest.json" />
    
    <title>Linder: League Matchmaking</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
      /* Initial splash loading screen */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #0b0b16;
        color: #f0f0f5;
        font-family: 'Outfit', sans-serif;
        overflow: hidden;
      }
      #splash-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9999;
        background: radial-gradient(circle at center, #181832 0%, #0b0b16 100%);
      }
      .logo-container {
        position: relative;
        margin-bottom: 24px;
      }
      .logo-text {
        font-size: 3.5rem;
        font-weight: 800;
        letter-spacing: 4px;
        background: linear-gradient(135deg, #f0e6d2 0%, #c89b3c 50%, #785a28 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 20px rgba(200, 155, 60, 0.3);
        margin: 0;
        text-transform: uppercase;
      }
      .logo-subtext {
        text-align: center;
        color: #00a2cc;
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 6px;
        text-transform: uppercase;
        margin-top: -4px;
        text-shadow: 0 0 10px rgba(0, 162, 204, 0.4);
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(200, 155, 60, 0.1);
        border-radius: 50%;
        border-top-color: #c89b3c;
        animation: spin 1s ease-in-out infinite;
        box-shadow: 0 0 15px rgba(200, 155, 60, 0.2);
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="splash-loader">
        <div class="logo-container">
          <h1 class="logo-text">Linder</h1>
          <div class="logo-subtext">Matchmaking</div>
        </div>
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
